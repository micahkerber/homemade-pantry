<svg width="200" height="400" viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- The Homemade Pantry — Wheat Stalk Element -->
  <!-- Upload to Canva as a graphic element -->

  <g transform="translate(100, 230) scale(1.4)">
    <!-- Curved stem -->
    <path d="M 1,75 C -1,45 -5,10 -3,-25 C -1,-50 3,-70 2,-95" fill="none" stroke="#2C6E6A" stroke-width="2.2" stroke-linecap="round"/>

    <!-- Top cap grain -->
    <ellipse cx="2" cy="-92" rx="6.5" ry="15" fill="#2C6E6A" opacity="0.95"/>

    <!-- Pair 1 -->
    <ellipse cx="-11" cy="-68" rx="7.5" ry="16" fill="#2C6E6A" transform="rotate(-18, -11, -68)" opacity="0.92"/>
    <ellipse cx="13" cy="-68" rx="7.5" ry="16" fill="#2C6E6A" transform="rotate(18, 13, -68)" opacity="0.92"/>

    <!-- Pair 2 -->
    <ellipse cx="-14" cy="-40" rx="7" ry="15" fill="#2C6E6A" transform="rotate(-18, -14, -40)" opacity="0.85"/>
    <ellipse cx="10" cy="-40" rx="7" ry="15" fill="#2C6E6A" transform="rotate(18, 10, -40)" opacity="0.85"/>

    <!-- Pair 3 -->
    <ellipse cx="-16" cy="-10" rx="6.5" ry="14" fill="#3D8C87" transform="rotate(-16, -16, -10)" opacity="0.75"/>
    <ellipse cx="8" cy="-10" rx="6.5" ry="14" fill="#3D8C87" transform="rotate(16, 8, -10)" opacity="0.75"/>

    <!-- Pair 4 -->
    <ellipse cx="-13" cy="18" rx="6" ry="12" fill="#3D8C87" transform="rotate(-14, -13, 18)" opacity="0.6"/>
    <ellipse cx="11" cy="18" rx="6" ry="12" fill="#3D8C87" transform="rotate(14, 11, 18)" opacity="0.6"/>

    <!-- Pair 5 -->
    <ellipse cx="-11" cy="42" rx="5.5" ry="11" fill="#3D8C87" transform="rotate(-12, -11, 42)" opacity="0.48"/>
    <ellipse cx="11" cy="42" rx="5.5" ry="11" fill="#3D8C87" transform="rotate(12, 11, 42)" opacity="0.48"/>
  </g>
</svg>
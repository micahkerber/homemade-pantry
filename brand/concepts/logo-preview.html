<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Homemade Pantry — Logo Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Jost:wght@400;500&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #EDE5D8;
      font-family: 'Jost', sans-serif;
      padding: 40px 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: #2A2520;
      text-align: center;
      margin-bottom: 8px;
      font-size: 1.6rem;
    }
    .subtitle {
      text-align: center;
      color: #8A847C;
      font-size: 0.85rem;
      margin-bottom: 48px;
      letter-spacing: 1px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      justify-content: center;
      align-items: flex-start;
    }

    .swatch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .swatch label {
      font-size: 0.75rem;
      color: #8A847C;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Sizes */
    .size-full  { width: 320px; height: 320px; }
    .size-med   { width: 160px; height: 160px; }
    .size-small { width: 80px;  height: 80px; }
    .size-tiny  { width: 40px;  height: 40px; }

    /* Context backgrounds */
    .bg-linen  { background: #FAF6EF; padding: 24px; border-radius: 12px; }
    .bg-teal   { background: #2C6E6A; padding: 24px; border-radius: 12px; }
    .bg-dark   { background: #2A2520; padding: 24px; border-radius: 12px; }
    .bg-white  { background: #ffffff; padding: 24px; border-radius: 12px; }

    .divider {
      width: 100%;
      border: none;
      border-top: 1px solid #D4C9B8;
      margin: 40px 0;
    }

    .section-title {
      text-align: center;
      color: #2A2520;
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>

  <h1>The Homemade Pantry</h1>
  <p class="subtitle">Brand Logo — Sticker / Print Format</p>

  <!-- Full size -->
  <div class="grid">
    <div class="swatch">
      <label>Full Size — on Linen</label>
      <div class="bg-linen">
        <img src="logo.svg" class="size-full" alt="The Homemade Pantry Logo">
      </div>
    </div>
  </div>

  <hr class="divider">
  <p class="section-title">Sizes — Sticker Scale Test</p>

  <div class="grid">
    <div class="swatch">
      <div class="bg-linen">
        <img src="logo.svg" class="size-med" alt="Logo medium">
      </div>
      <label>Medium (2")</label>
    </div>
    <div class="swatch">
      <div class="bg-linen">
        <img src="logo.svg" class="size-small" alt="Logo small">
      </div>
      <label>Small (1")</label>
    </div>
    <div class="swatch">
      <div class="bg-linen">
        <img src="logo.svg" class="size-tiny" alt="Logo tiny">
      </div>
      <label>Tiny (0.5")</label>
    </div>
  </div>

  <hr class="divider">
  <p class="section-title">On Different Backgrounds</p>

  <div class="grid">
    <div class="swatch">
      <div class="bg-white">
        <img src="logo.svg" class="size-med" alt="Logo on white">
      </div>
      <label>White</label>
    </div>
    <div class="swatch">
      <div class="bg-linen">
        <img src="logo.svg" class="size-med" alt="Logo on linen">
      </div>
      <label>Linen / Cream</label>
    </div>
    <div class="swatch">
      <div class="bg-teal">
        <img src="logo.svg" class="size-med" alt="Logo on teal">
      </div>
      <label>Teal</label>
    </div>
    <div class="swatch">
      <div class="bg-dark">
        <img src="logo.svg" class="size-med" alt="Logo on dark">
      </div>
      <label>Dark</label>
    </div>
  </div>

  <hr class="divider">
  <p class="section-title">Sticker Context — Bread Bag Mockup</p>

  <div class="grid">
    <div class="swatch">
      <div style="background: #D4C9B8; padding: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 20px;">
        <!-- Simulated bread bag -->
        <div style="width: 180px; height: 220px; background: linear-gradient(135deg, #F5EDD8, #E8DCC8); border-radius: 4px 4px 16px 16px; border: 1px solid #C8B898; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 2px 3px 8px rgba(0,0,0,0.12);">
          <div style="position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 160px; height: 2px; background: #C8B898;"></div>
          <img src="logo.svg" style="width: 90px; height: 90px;" alt="Sticker on bag">
        </div>
      </div>
      <label>Sticker on bag mockup</label>
    </div>
  </div>

</body>
</html>
